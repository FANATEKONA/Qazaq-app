<div class="dashboard-container">
  <header class="dashboard-header">
    <h1>Уровень {{ levelId | uppercase }}</h1>
    <p>Программа обучения</p>
  </header>

  <div class="modules-grid">
    <div class="module-card">
      <div class="icon">🎥</div>
      <h3>Видеоуроки</h3>
      <p>Основы произношения и грамматики</p>
      <button class="btn card-btn" [routerLink]="['/levels', levelId, 'video', '1']">Смотреть</button>
    </div>

    <div class="module-card">
      <div class="icon">📚</div>
      <h3>Грамматика</h3>
      <p>Правила и упражнения</p>
      <button class="btn card-btn" [routerLink]="['/levels', levelId, 'grammar', '1']">Учить</button>
    </div>

    <div class="module-card">
      <div class="icon">🗣️</div>
      <h3>Shadowing</h3>
      <p>Практика речи</p>
      <button class="btn card-btn" [routerLink]="['/levels', levelId, 'shadowing', '1']">Практика</button>
    </div>

    <div class="module-card">
      <div class="icon">📝</div>
      <h3>Чтение и Аудирование</h3>
      <p>Развитие навыков</p>
      <button class="btn card-btn" [routerLink]="['/levels', levelId, 'skills', 'reading']">Перейти</button>
    </div>
  </div>

  <div class="test-section">
    <h2>Завершение модуля</h2>
    <p>Проверь свои знания после прохождения всех уроков.</p>
    <button class="btn primary test-btn" [routerLink]="['/levels', levelId, 'test']">
      Пройти тест модуля
    </button>
  </div>
</div>
